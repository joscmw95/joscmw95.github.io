<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hungry Hungry Felhound</title>
<style>
  html, body { margin: 0; height: 100%; background: #05050a; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; font-family: "Courier New", monospace; }
  #wrap { position: relative; }
  canvas { display: block; background: #0c0c14; border: 2px solid #1e2a1e; box-shadow: 0 0 60px #041004, 0 0 120px #000; }
  canvas.aiming { cursor: crosshair; }
  #banner {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; font-weight: bold; text-align: center;
    font-family: Impact, "Arial Black", sans-serif; letter-spacing: 4px;
    color: #ff3838; text-shadow: 0 0 20px #ff6a00, 0 0 60px #ff0000;
    font-size: 64px; opacity: 0; transition: opacity 0.15s;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="640"></canvas>
  <div id="banner"></div>
</div>
<script>
"use strict";
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const banner = document.getElementById("banner");
const W = canvas.width, H = canvas.height;

// ================= Tuning =================
const PLAYER_SPEED = 240;
const HOLDER_SPEED = 212;
const PLAYER_R = 14;
const HOUND_R = 19;

const CX = W / 2, CY = H / 2;
const ARENA_R = 298;               // circular ritual disc

const THROW_RANGE = ARENA_R * 2 * 0.8;   // ~80% of the arena
const ORB_FLY_SPEED = 920;
const THROW_COOLDOWN = 0.35;
const CAST_TIME = 0.2;            // channel before the orb launches — you're frozen and exposed
const CLICK_LENIENCY = 60;

const DASH_SPEED = 780;
const DASH_TIME = 0.16;
const DASH_CD = 2.4;

// Slippery-ice felhound: pure ballistic momentum, no tricks
const HOUND_BASE_SPEED = 115;
const HOUND_RAMP = 21;
const HOUND_PEAK = 760;
const HOUND_ACCEL = 800;
const HOUND_DRAG = 0.25;
const WALL_BOUNCE = 0.45;          // low restitution: it slides along the rim, keeping its tangential speed

const KAMEHAMEHA_SPEED = 480;
const KAME_CHARGE_TIME = 2.4;

const CRYSTAL_BOOST = 1.38;
const CRYSTAL_TIME = 3.0;
const WINS_TO_WIN = 3;

// ================= State =================
// state: "menu" | "countdown" | "play" | "roundover" | "matchover"
let state = "menu";
let players = [], hound = null, orb = null;
let kamePhase = null, kameT = 0, flash = 0, shake = 0, time = 0, countT = 0;
let roundWinner = null, matchWinner = null;
let aiming = false, mouse = { x: W/2, y: H/2 }, rmbDown = false;
let clickFX = [], particles = [], floatTexts = [], msgs = [], skulls = [], crystals = [];
let crystalT = 5;

// ================= Input =================
addEventListener("keydown", e => {
  initAudio();
  const k = e.key.toLowerCase();
  if (k === " ") {
    e.preventDefault();
    if (state === "menu" || state === "roundover") startRound();
    else if (state === "matchover") { resetMatch(); startRound(); }
    return;
  }
  if (state !== "play" && state !== "countdown") return;
  const me = players[0];
  if (k === "a" && orb.state === "held" && orb.holder === me && me.alive && orb.cooldown <= 0 && !orb.cast) aiming = true;
  if (k === "escape") aiming = false;
  if (k === "s" && me.alive) { me.moveTarget = null; }
  if (k === "d" && me.alive && me.dashCD <= 0) doDash(me, mouse.x - me.x, mouse.y - me.y);
});
canvas.addEventListener("contextmenu", e => e.preventDefault());
canvas.addEventListener("pointermove", e => {
  mouse.x = e.offsetX; mouse.y = e.offsetY;
  if (rmbDown && players[0] && players[0].alive) players[0].moveTarget = clampPointToArena(mouse.x, mouse.y, PLAYER_R + 8);
});
canvas.addEventListener("pointerup", e => { if (e.button === 2) rmbDown = false; });
canvas.addEventListener("pointerdown", e => {
  initAudio();
  if (state !== "play" && state !== "countdown") return;
  const mx = e.offsetX, my = e.offsetY;
  const me = players[0];
  if (e.button === 2) {                       // right-click: move order (cancels aiming, like WC3)
    aiming = false;
    rmbDown = true;
    if (me.alive) {
      me.moveTarget = clampPointToArena(mx, my, PLAYER_R + 8);
      clickFX.push({ x: me.moveTarget.x, y: me.moveTarget.y, t: 0.5, color: "#4eff6a" });
    }
  } else if (e.button === 0 && aiming) {      // left-click while aiming: begin the throw channel
    const best = aimTargetAt(mx, my);
    if (best) {
      startCast(orb.holder, best);
      aiming = false;
    } else {
      clickFX.push({ x: mx, y: my, t: 0.5, color: "#ff4e4e" });
    }
  }
});
function aimTargetAt(mx, my) {
  let best = null, bd = 1e9;
  for (const p of players) {
    if (!p.alive || p === orb.holder) continue;
    const d = Math.hypot(p.x - mx, p.y - my);
    if (d < bd) { bd = d; best = p; }
  }
  return (best && bd <= CLICK_LENIENCY && dist(best, orb.holder) <= THROW_RANGE) ? best : null;
}
function doDash(p, dx, dy) {
  if (orb.state === "held" && orb.holder === p && orb.cast) return;   // rooted while channeling
  const m = Math.hypot(dx, dy) || 1;
  p.dash = { t: DASH_TIME, dx: dx / m, dy: dy / m };
  p.dashCD = DASH_CD;
  sfxDash();
  for (let i = 0; i < 10; i++)
    spawnP(p.x, p.y, -p.dash.dx * 80 + rnd(-40, 40), -p.dash.dy * 80 + rnd(-40, 40), 0.35, 4, "180,180,200", { glow: false, drag: 3 });
}

// ================= Setup =================
function resetMatch() {
  players = [
    mkPlayer("YOU",     "#4ecdc4", true,  W*0.25, H*0.25),
    mkPlayer("GROM",    "#ff8c42", false, W*0.75, H*0.25),
    mkPlayer("JAINA",   "#7db8ff", false, W*0.25, H*0.75),
    mkPlayer("ILLIDAN", "#b16bff", false, W*0.75, H*0.75),
  ];
  hound = mkHound();
  orb = { state: "held", holder: players[0], x: players[0].x, y: players[0].y - PLAYER_R - 22, target: null, cast: null, cooldown: 1 };
  matchWinner = null;
  state = "menu";
}
function mkPlayer(name, color, human, x, y) {
  return { name, color, human, x, y, px: x, py: y, vx: 0, vy: 0, alive: true,
           moveTarget: null, wanderT: 0, wx: 0, wy: 0, botThrowT: 0,
           dashCD: 0, dash: null, boostT: 0, wins: 0 };
}
function mkHound() {
  return { x: CX, y: CY, vx: 0, vy: 0, maxSpeed: HOUND_BASE_SPEED, angle: 0, state: "sleep" };
}
function startRound() {
  const spots = [[W*0.25,H*0.25],[W*0.75,H*0.25],[W*0.25,H*0.75],[W*0.75,H*0.75]];
  players.forEach((p, i) => {
    p.x = spots[i][0]; p.y = spots[i][1]; p.px = p.x; p.py = p.y;
    p.alive = true; p.moveTarget = null; p.dash = null; p.dashCD = 0; p.boostT = 0; p.botThrowT = 0;
  });
  hound = mkHound();
  const first = players[Math.floor(Math.random() * players.length)];
  orb = { state: "held", holder: first, x: first.x, y: first.y, target: null, cast: null, cooldown: 1.2 };
  kamePhase = null; kameT = 0; flash = 0; shake = 0;
  stopChargeSound();
  aiming = false; rmbDown = false;
  clickFX = []; particles = []; floatTexts = []; skulls = []; crystals = [];
  crystalT = 5;
  roundWinner = null;
  countT = 2.1;
  state = "countdown";
  banner.style.opacity = 0;
  announce("The felhound stirs...", "#8f8");
}
function announce(text, color) {
  msgs.push({ text, color: color || "#ddd", t: 3.2, tl: 3.2 });
  if (msgs.length > 4) msgs.shift();
}
function startCast(from, target) {
  orb.cast = { t: CAST_TIME, target };
  tone(now(), { type: "sine", f0: 500, f1: 950, dur: CAST_TIME, vol: 0.09 });
}
function throwOrb(from, to) {
  orb.state = "flying";
  orb.holder = null;
  orb.cast = null;
  orb.x = from.x; orb.y = from.y - PLAYER_R - 22;
  orb.target = to;
  sfxThrow();
}

// ================= Audio =================
let AC = null;
function initAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === "suspended") AC.resume();
}
let noiseBuf = null;
function getNoise() {
  if (noiseBuf) return noiseBuf;
  noiseBuf = AC.createBuffer(1, AC.sampleRate * 2, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return noiseBuf;
}
function tone(t, o) {
  if (!AC) return;
  const osc = AC.createOscillator(), g = AC.createGain();
  osc.type = o.type || "sine";
  osc.frequency.setValueAtTime(o.f0, t);
  if (o.f1) osc.frequency.exponentialRampToValueAtTime(Math.max(20, o.f1), t + o.dur);
  g.gain.setValueAtTime(o.vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + o.dur);
  let head = osc;
  if (o.fType) {
    const f = AC.createBiquadFilter();
    f.type = o.fType; f.frequency.value = o.fFreq; f.Q.value = o.fQ || 1;
    osc.connect(f); head = f;
  }
  head.connect(g).connect(AC.destination);
  osc.start(t); osc.stop(t + o.dur + 0.02);
}
function noiseHit(t, o) {
  if (!AC) return;
  const src = AC.createBufferSource(); src.buffer = getNoise();
  const f = AC.createBiquadFilter();
  f.type = o.fType || "bandpass";
  f.frequency.setValueAtTime(o.f0, t);
  if (o.f1) f.frequency.exponentialRampToValueAtTime(o.f1, t + o.dur);
  f.Q.value = o.q || 1;
  const g = AC.createGain();
  g.gain.setValueAtTime(o.vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + o.dur);
  src.connect(f).connect(g).connect(AC.destination);
  src.start(t); src.stop(t + o.dur + 0.02);
}
// --- 16-step fel sequencer: layers stack as the hound's rage builds ---
let seqStep = 0, seqNext = 0;
const BASS = [0,-1,0,-1, 3,-1,0,-1, 1,-1,0,-1, 3,1,0,-1];                    // E phrygian degrees
const BASS_F = [41.2, 43.65, 49.0, 55.0, 61.74, 65.41, 73.42];               // E1 F1 G1 A1 B1 C2 D2
const ARP = [329.63, 349.23, 392.0, 493.88, 659.25];                          // E4 F4 G4 B4 E5
function scheduleMusic(intensity, kame) {
  if (!AC || (state !== "play" && state !== "countdown")) return;
  if (seqNext < AC.currentTime - 0.5) seqNext = AC.currentTime;              // resync after pause
  const stepDur = kame ? 0.105 : 0.175 - 0.055 * intensity;
  while (seqNext < AC.currentTime + 0.12) {
    const s = seqStep, t = seqNext;
    if (s % 4 === 0) tone(t, { type: "sine", f0: 150, f1: 42, dur: 0.22, vol: 0.24 + 0.1 * intensity });
    if ((kame && s % 1 === 0) || (intensity > 0.25 && s % 2 === 0))
      noiseHit(t, { fType: "highpass", f0: 6000, dur: 0.04, vol: kame ? 0.05 : 0.028 });
    if (intensity > 0.5 && (s === 4 || s === 12))
      noiseHit(t, { fType: "bandpass", f0: 1800, dur: 0.12, vol: 0.09, q: 0.8 });
    if (BASS[s] >= 0)
      tone(t, { type: "sawtooth", f0: BASS_F[BASS[s]] * (kame ? 2 : 1), dur: stepDur * 1.8,
                vol: 0.1 + 0.07 * intensity, fType: "lowpass", fFreq: 300 + 900 * intensity });
    if ((intensity > 0.6 || kame) && s % 2 === 1)
      tone(t, { type: "square", f0: ARP[(s * 3) % 5] * (kame ? 2 : 1), dur: stepDur * 0.9,
                vol: 0.032, fType: "lowpass", fFreq: 3500 });
    seqNext += stepDur;
    seqStep = (seqStep + 1) % 16;
  }
}
// --- SFX ---
const now = () => AC ? AC.currentTime : 0;
function sfxThrow()   { noiseHit(now(), { fType: "bandpass", f0: 700, f1: 2600, dur: 0.22, vol: 0.22, q: 2 }); }
function sfxCatch()   { tone(now(), { type: "triangle", f0: 300, f1: 140, dur: 0.15, vol: 0.2 }); }
function sfxDash()    { noiseHit(now(), { fType: "bandpass", f0: 1200, f1: 3200, dur: 0.15, vol: 0.18, q: 1.5 }); }
function sfxCrystal() { tone(now(), { type: "sine", f0: 659, dur: 0.18, vol: 0.14 }); tone(now() + 0.08, { type: "sine", f0: 987, dur: 0.25, vol: 0.12 }); }
function sfxGrowl()   { tone(now(), { type: "sawtooth", f0: 110, f1: 55, dur: 0.45, vol: 0.3, fType: "lowpass", fFreq: 400 });
                        noiseHit(now(), { fType: "lowpass", f0: 500, dur: 0.4, vol: 0.12 }); }
function sfxChomp()   { tone(now(), { type: "sawtooth", f0: 80, f1: 30, dur: 0.5, vol: 0.42 });
                        noiseHit(now(), { fType: "lowpass", f0: 900, f1: 150, dur: 0.3, vol: 0.35 }); }
// --- Goku-style KAMEHAMEHA ---
let chargeNodes = null;
function startChargeSound(dur) {
  if (!AC) return;
  const t0 = AC.currentTime;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.04, t0);
  g.gain.linearRampToValueAtTime(0.32, t0 + dur);
  const o1 = AC.createOscillator(), o2 = AC.createOscillator();
  o1.type = o2.type = "sawtooth";
  o1.frequency.setValueAtTime(65, t0); o1.frequency.exponentialRampToValueAtTime(540, t0 + dur);
  o2.frequency.setValueAtTime(66, t0); o2.frequency.exponentialRampToValueAtTime(548, t0 + dur);
  const filt = AC.createBiquadFilter();
  filt.type = "lowpass";
  filt.frequency.setValueAtTime(900, t0);
  filt.frequency.exponentialRampToValueAtTime(4500, t0 + dur);
  const lfo = AC.createOscillator(), lfoG = AC.createGain();
  lfo.frequency.setValueAtTime(8, t0);
  lfo.frequency.linearRampToValueAtTime(22, t0 + dur);
  lfoG.gain.value = 0.12;
  lfo.connect(lfoG).connect(g.gain);
  o1.connect(filt); o2.connect(filt); filt.connect(g).connect(AC.destination);
  o1.start(); o2.start(); lfo.start();
  const stopAt = t0 + dur + 0.05;
  o1.stop(stopAt); o2.stop(stopAt); lfo.stop(stopAt);
  chargeNodes = { g };
}
function stopChargeSound() {
  if (!chargeNodes || !AC) return;
  try {
    chargeNodes.g.gain.cancelScheduledValues(AC.currentTime);
    chargeNodes.g.gain.setTargetAtTime(0.0001, AC.currentTime, 0.03);
  } catch (e) {}
  chargeNodes = null;
}
function blastSound() {
  if (!AC) return;
  const t0 = AC.currentTime;
  const src = AC.createBufferSource();
  src.buffer = getNoise(); src.loop = true;
  const nf = AC.createBiquadFilter();
  nf.type = "lowpass";
  nf.frequency.setValueAtTime(7000, t0);
  nf.frequency.exponentialRampToValueAtTime(300, t0 + 2.2);
  const ng = AC.createGain();
  ng.gain.setValueAtTime(0.55, t0);
  ng.gain.exponentialRampToValueAtTime(0.001, t0 + 2.4);
  src.connect(nf).connect(ng).connect(AC.destination);
  src.start(); src.stop(t0 + 2.5);
  for (const f of [196, 202, 191]) {                       // the shout
    const o = AC.createOscillator(), bp = AC.createBiquadFilter(), g = AC.createGain();
    o.type = "sawtooth";
    o.frequency.setValueAtTime(f, t0);
    o.frequency.linearRampToValueAtTime(f * 1.6, t0 + 0.12);
    o.frequency.linearRampToValueAtTime(f * 1.5, t0 + 1.4);
    bp.type = "bandpass"; bp.frequency.value = 950; bp.Q.value = 1.2;
    g.gain.setValueAtTime(0.16, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 1.6);
    o.connect(bp).connect(g).connect(AC.destination);
    o.start(); o.stop(t0 + 1.7);
  }
  tone(t0, { type: "sine", f0: 130, f1: 38, dur: 1.2, vol: 0.5 });
}

// ================= Particles & text =================
function rnd(a, b) { return a + Math.random() * (b - a); }
function spawnP(x, y, vx, vy, life, size, rgb, o = {}) {
  if (particles.length > 700) particles.shift();
  particles.push({ x, y, vx, vy, life, tl: life, size, rgb,
                   grav: o.grav || 0, drag: o.drag || 0, glow: o.glow !== false });
}
function floatText(x, y, text, color, size) {
  floatTexts.push({ x, y, text, color, size: size || 16, t: 1.2, tl: 1.2 });
}
function updateFX(dt) {
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += p.grav * dt;
    if (p.drag) { p.vx *= (1 - p.drag * dt); p.vy *= (1 - p.drag * dt); }
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
  for (const f of floatTexts) { f.y -= 28 * dt; f.t -= dt; }
  floatTexts = floatTexts.filter(f => f.t > 0);
  for (const m of msgs) m.t -= dt;
  msgs = msgs.filter(m => m.t > 0);
  for (const fx of clickFX) fx.t -= dt;
  clickFX = clickFX.filter(fx => fx.t > 0);
}

// ================= Pre-rendered floor =================
const floorCv = document.createElement("canvas");
floorCv.width = W; floorCv.height = H;
(function buildFloor() {
  const f = floorCv.getContext("2d");
  // the void beyond the arena
  f.fillStyle = "#04040a"; f.fillRect(0, 0, W, H);
  const ag = f.createRadialGradient(CX, CY, ARENA_R, CX, CY, ARENA_R + 130);
  ag.addColorStop(0, "rgba(60,140,60,0.13)"); ag.addColorStop(1, "rgba(0,0,0,0)");
  f.fillStyle = ag; f.fillRect(0, 0, W, H);
  // stone disc
  f.save();
  f.beginPath(); f.arc(CX, CY, ARENA_R, 0, Math.PI * 2); f.clip();
  f.fillStyle = "#0e0e17"; f.fillRect(0, 0, W, H);
  for (let x = 0; x < W; x += 64) for (let y = 0; y < H; y += 64) {
    f.fillStyle = `rgba(${20 + rnd(-6, 8)|0},${20 + rnd(-6, 6)|0},${32 + rnd(-8, 8)|0},1)`;
    f.fillRect(x + 1, y + 1, 62, 62);
    if (Math.random() < 0.3) {                             // cracks
      f.strokeStyle = "rgba(0,0,0,0.5)"; f.lineWidth = 1;
      f.beginPath();
      let cx = x + rnd(8, 56), cy = y + rnd(8, 56);
      f.moveTo(cx, cy);
      for (let i = 0; i < 3; i++) { cx += rnd(-18, 18); cy += rnd(-18, 18); f.lineTo(cx, cy); }
      f.stroke();
    }
  }
  f.restore();
  // ritual circle
  f.strokeStyle = "rgba(90,160,90,0.28)"; f.lineWidth = 3;
  f.beginPath(); f.arc(CX, CY, 150, 0, Math.PI * 2); f.stroke();
  f.lineWidth = 1;
  f.beginPath(); f.arc(CX, CY, 128, 0, Math.PI * 2); f.stroke();
  const runes = "ᚠᚢᚦᚨᚱᚲᚺᚾᛁᛒᛖᛗᛚᛞᛟᛊ";
  f.fillStyle = "rgba(110,190,110,0.35)"; f.font = "18px serif"; f.textAlign = "center"; f.textBaseline = "middle";
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    f.save();
    f.translate(CX + Math.cos(a) * 139, CY + Math.sin(a) * 139);
    f.rotate(a + Math.PI / 2);
    f.fillText(runes[i], 0, 0);
    f.restore();
  }
  // rim: dark stone ring with a faint fel edge
  f.strokeStyle = "#191924"; f.lineWidth = 16;
  f.beginPath(); f.arc(CX, CY, ARENA_R - 8, 0, Math.PI * 2); f.stroke();
  f.strokeStyle = "rgba(106,255,78,0.3)"; f.lineWidth = 2;
  f.beginPath(); f.arc(CX, CY, ARENA_R, 0, Math.PI * 2); f.stroke();
  // rim rune ticks
  f.strokeStyle = "rgba(106,255,78,0.18)"; f.lineWidth = 2;
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    f.beginPath();
    f.moveTo(CX + Math.cos(a) * (ARENA_R - 16), CY + Math.sin(a) * (ARENA_R - 16));
    f.lineTo(CX + Math.cos(a) * (ARENA_R - 2), CY + Math.sin(a) * (ARENA_R - 2));
    f.stroke();
  }
})();
const TORCHES = [0, 1, 2, 3].map(i => {
  const a = Math.PI / 4 + i * Math.PI / 2;
  return [CX + Math.cos(a) * (ARENA_R + 34), CY + Math.sin(a) * (ARENA_R + 34)];
});

// ================= AI =================
function botThink(p, dt) {
  // sidestep a fast incoming slide with a dash
  if (p.dashCD <= 0 && dist(p, hound) < 150 && Math.hypot(hound.vx, hound.vy) > 330) {
    const a = Math.atan2(p.y - hound.y, p.x - hound.x) + (Math.random() < 0.5 ? 1.4 : -1.4);
    doDash(p, Math.cos(a), Math.sin(a));
  }
  if (orb.state === "held" && orb.holder === p) {
    if (orb.cast) return;                       // mid-channel: rooted, pray
    p.botThrowT -= dt;
    const houndClose = dist(p, hound) < 270;    // throw earlier — the channel takes time
    if (orb.cooldown <= 0 && (houndClose || p.botThrowT <= 0)) {
      let best = null, bs = -1;
      for (const q of players) {
        if (q === p || !q.alive || dist(p, q) > THROW_RANGE) continue;
        const s = dist(q, hound);
        if (s > bs) { bs = s; best = q; }
      }
      if (best) { startCast(p, best); p.botThrowT = 1 + Math.random() * 1.5; return; }
    }
    // no one in range: close distance, circling if the hound is near (exploit the drift)
    let near = null, nd = 1e9;
    for (const q of players) { if (q !== p && q.alive) { const d = dist(p, q); if (d < nd) { nd = d; near = q; } } }
    let dx = near ? near.x - p.x : 0, dy = near ? near.y - p.y : 0;
    if (dist(p, hound) < 210) {
      const ang = Math.atan2(p.y - hound.y, p.x - hound.x) + 1.1;
      dx += Math.cos(ang) * 340; dy += Math.sin(ang) * 340;
    }
    const m = Math.hypot(dx, dy) || 1;
    p.moveTarget = { x: p.x + dx / m * 120, y: p.y + dy / m * 120 };
  } else {
    let dx = 0, dy = 0;
    const hd = Math.max(dist(p, hound), 1);
    if (hd < 150) { dx += (p.x - hound.x) / hd * 200; dy += (p.y - hound.y) / hd * 200; }
    // grab a crystal if it's safe-ish
    let gem = null, gd = 1e9;
    for (const c of crystals) { const d = Math.hypot(c.x - p.x, c.y - p.y); if (d < gd) { gd = d; gem = c; } }
    if (gem && gd < 240 && hd > 200) { dx += (gem.x - p.x); dy += (gem.y - p.y); }
    p.wanderT -= dt;
    if (p.wanderT <= 0) {
      p.wanderT = 0.8 + Math.random() * 1.2;
      const a = Math.random() * Math.PI * 2;
      p.wx = Math.cos(a); p.wy = Math.sin(a);
    }
    dx += p.wx * 90; dy += p.wy * 90;
    const cd = Math.hypot(p.x - CX, p.y - CY) || 1;
    if (cd > ARENA_R - 120) { dx += (CX - p.x) / cd * 160; dy += (CY - p.y) / cd * 160; }
    const m = Math.hypot(dx, dy) || 1;
    p.moveTarget = { x: p.x + dx / m * 100, y: p.y + dy / m * 100 };
  }
}

// ================= Update =================
function clampToArena(e, r) {
  const dx = e.x - CX, dy = e.y - CY;
  const d = Math.hypot(dx, dy), max = ARENA_R - r - 6;
  if (d > max) { e.x = CX + dx / d * max; e.y = CY + dy / d * max; }
}
function clampPointToArena(x, y, margin) {
  const dx = x - CX, dy = y - CY;
  const d = Math.hypot(dx, dy), max = ARENA_R - margin;
  if (d > max) return { x: CX + dx / d * max, y: CY + dy / d * max };
  return { x, y };
}
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function rage() { return Math.min(1, (hound.maxSpeed - HOUND_BASE_SPEED) / (KAMEHAMEHA_SPEED - HOUND_BASE_SPEED)); }

function update(dt) {
  time += dt;
  if (state === "countdown") {
    countT -= dt;
    if (countT <= 0) {
      state = "play";
      hound.state = "chase";
      floatText(W/2, H/2 - 60, "DEVOUR!", "#6aff4e", 42);
      sfxGrowl();
    }
  }
  orb.cooldown -= dt;

  // ----- players -----
  for (const p of players) {
    p.px = p.x; p.py = p.y;
    if (!p.alive) continue;
    p.dashCD -= dt;
    p.boostT -= dt;
    if (!p.human) botThink(p, dt);
    const casting = orb.state === "held" && orb.holder === p && orb.cast;
    if (p.dash) {
      p.dash.t -= dt;
      p.x += p.dash.dx * DASH_SPEED * dt;
      p.y += p.dash.dy * DASH_SPEED * dt;
      spawnP(p.x, p.y, rnd(-20, 20), rnd(-20, 20), 0.3, 3, "200,220,255", { drag: 2 });
      if (p.dash.t <= 0) p.dash = null;
    } else if (p.moveTarget && !casting) {
      const dx = p.moveTarget.x - p.x, dy = p.moveTarget.y - p.y;
      const d = Math.hypot(dx, dy);
      let spd = (orb.state === "held" && orb.holder === p) ? HOLDER_SPEED : PLAYER_SPEED;
      if (p.boostT > 0) spd *= CRYSTAL_BOOST;
      if (d < spd * dt) {
        p.x = p.moveTarget.x; p.y = p.moveTarget.y;
        p.moveTarget = null;
      } else {
        p.x += dx / d * spd * dt;
        p.y += dy / d * spd * dt;
        if (Math.random() < dt * 8)                        // footstep dust
          spawnP(p.x, p.y + PLAYER_R - 3, rnd(-15, 15), rnd(-8, 2), 0.4, 3, "70,70,90", { glow: false, drag: 2 });
      }
    }
    clampToArena(p, PLAYER_R);
    if (dt > 0.001) { p.vx = (p.x - p.px) / dt; p.vy = (p.y - p.py) / dt; }
  }

  // ----- crystals -----
  crystalT -= dt;
  if (crystalT <= 0 && crystals.length < 2 && state === "play") {
    crystalT = 6 + Math.random() * 3;
    let cx, cy, tries = 0;
    do {
      const a = rnd(0, Math.PI * 2), rr = rnd(50, ARENA_R - 70);
      cx = CX + Math.cos(a) * rr; cy = CY + Math.sin(a) * rr; tries++;
    } while (Math.hypot(cx - hound.x, cy - hound.y) < 180 && tries < 20);
    crystals.push({ x: cx, y: cy, rot: 0 });
  }
  for (const c of crystals) {
    c.rot += dt * 2;
    if (Math.random() < dt * 4) spawnP(c.x + rnd(-8, 8), c.y + rnd(-8, 8), 0, -20, 0.6, 2, "106,255,78");
  }
  crystals = crystals.filter(c => {
    for (const p of players) {
      if (p.alive && Math.hypot(p.x - c.x, p.y - c.y) < PLAYER_R + 12) {
        p.boostT = CRYSTAL_TIME;
        sfxCrystal();
        floatText(c.x, c.y - 16, "SWIFTNESS!", "#6aff4e", 14);
        for (let i = 0; i < 14; i++) spawnP(c.x, c.y, rnd(-90, 90), rnd(-90, 90), 0.5, 3, "106,255,78", { drag: 2 });
        return false;
      }
    }
    return true;
  });

  // ----- orb -----
  if (orb.state === "held") {
    orb.x = orb.holder.x; orb.y = orb.holder.y - PLAYER_R - 22;
    if (orb.cast) {                                        // channeling the throw
      orb.cast.t -= dt;
      if (Math.random() < dt * 30)
        spawnP(orb.x + rnd(-10, 10), orb.y + rnd(-10, 10), rnd(-30, 30), rnd(-50, -10), 0.3, 2, "141,255,176");
      if (!orb.cast.target.alive) orb.cast = null;
      else if (orb.cast.t <= 0) throwOrb(orb.holder, orb.cast.target);
    }
  } else if (orb.state === "flying") {
    if (!orb.target.alive) orb.target = players.find(p => p.alive);
    const dx = orb.target.x - orb.x, dy = (orb.target.y - PLAYER_R - 22) - orb.y;
    const d = Math.hypot(dx, dy);
    spawnP(orb.x, orb.y, rnd(-15, 15), rnd(-15, 15), 0.35, 3, "125,249,180");
    if (d < ORB_FLY_SPEED * dt + PLAYER_R) {
      orb.state = "held";
      orb.holder = orb.target;
      orb.target = null;
      orb.cooldown = THROW_COOLDOWN;
      sfxCatch();
    } else {
      orb.x += dx / d * ORB_FLY_SPEED * dt;
      orb.y += dy / d * ORB_FLY_SPEED * dt;
    }
  }

  // ----- felhound -----
  if (state === "play") hound.maxSpeed = Math.min(HOUND_PEAK, hound.maxSpeed + HOUND_RAMP * dt);
  if (!kamePhase && hound.maxSpeed >= KAMEHAMEHA_SPEED) {
    kamePhase = "charging";
    kameT = 0;
    startChargeSound(KAME_CHARGE_TIME);
    announce("IT'S CHARGING UP...", "#7df9ff");
  }
  if (kamePhase === "charging") {
    kameT += dt;
    const SYLL = ["KA...", "KA... ME...", "KA... ME... HA...", "KA... ME... HA... ME..."];
    banner.textContent = SYLL[Math.min(3, Math.floor(kameT / (KAME_CHARGE_TIME / 4)))];
    banner.style.fontSize = "44px";
    banner.style.opacity = 1;
    if (kameT >= KAME_CHARGE_TIME) {
      kamePhase = "blast";
      banner.textContent = "HAAAAAAA!!!";
      banner.style.fontSize = "84px";
      blastSound();
      flash = 1;
      shake = 22;
      hound.maxSpeed = HOUND_PEAK;
      announce("MAXIMUM OVERDRIVE!!!", "#ff4e4e");
      for (let i = 0; i < 40; i++) {
        const a = rnd(0, Math.PI * 2), s = rnd(100, 420);
        spawnP(hound.x, hound.y, Math.cos(a) * s, Math.sin(a) * s, 0.7, 4, "255,90,60", { drag: 1.5 });
      }
      setTimeout(() => { if (kamePhase === "blast") banner.style.opacity = 0; }, 1400);
    }
  }
  const kame = kamePhase === "blast";

  if (hound.state !== "sleep") {
    // pure ballistic pursuit: thrust toward the orb, momentum does the rest
    const tx = orb.x - hound.x, ty = orb.y - hound.y;
    const tm = Math.hypot(tx, ty) || 1;
    const accel = HOUND_ACCEL * (kame ? 1.7 : kamePhase === "charging" ? 0.4 : 1);
    hound.vx += (tx / tm) * accel * dt;
    hound.vy += (ty / tm) * accel * dt;
    hound.vx *= (1 - HOUND_DRAG * dt);
    hound.vy *= (1 - HOUND_DRAG * dt);
    let hv = Math.hypot(hound.vx, hound.vy);
    if (hv > hound.maxSpeed) {
      hound.vx = hound.vx / hv * hound.maxSpeed;
      hound.vy = hound.vy / hv * hound.maxSpeed;
    }
    hound.x += hound.vx * dt;
    hound.y += hound.vy * dt;
    // circular rim: kill some radial speed, keep tangential — it grinds along the edge
    const rd = Math.hypot(hound.x - CX, hound.y - CY);
    const rmax = ARENA_R - HOUND_R - 4;
    if (rd > rmax) {
      const nx = (hound.x - CX) / rd, ny = (hound.y - CY) / rd;
      hound.x = CX + nx * rmax;
      hound.y = CY + ny * rmax;
      const vn = hound.vx * nx + hound.vy * ny;
      if (vn > 0) {
        hound.vx -= (1 + WALL_BOUNCE) * vn * nx;
        hound.vy -= (1 + WALL_BOUNCE) * vn * ny;
        if (vn > 120) {                                    // sparks off the rim stones
          for (let i = 0; i < 6; i++)
            spawnP(hound.x, hound.y, -nx * rnd(40, 160) + rnd(-80, 80), -ny * rnd(40, 160) + rnd(-80, 80),
                   0.3, 2, "255,200,90", { drag: 2 });
        }
      }
    }
    hv = Math.hypot(hound.vx, hound.vy);
    if (hv > 1) hound.angle = Math.atan2(hound.vy, hound.vx);
    // fire trail: orange when calm, fel-green when raging
    const n = Math.min(4, hv * 0.006);
    for (let i = 0; i < n; i++) {
      const r = rage();
      const rgb = kame ? "255,60,40" : r > 0.6 ? "106,255,78" : "255,140,40";
      spawnP(hound.x - Math.cos(hound.angle) * HOUND_R, hound.y - Math.sin(hound.angle) * HOUND_R,
             rnd(-30, 30) - hound.vx * 0.15, rnd(-30, 30) - hound.vy * 0.15, rnd(0.2, 0.45), rnd(3, 6), rgb, { drag: 2 });
    }
  } else if (Math.random() < dt * 0.8) {
    floatText(hound.x + 20, hound.y - 24, "z", "#889", 13);
  }

  // ----- CHOMP -----
  if (state === "play" && orb.state === "held" && dist(hound, orb.holder) < HOUND_R + PLAYER_R) {
    devour(orb.holder);
  }

  updateFX(dt);
  shake = Math.max(0, shake - 40 * dt);
  flash = Math.max(0, flash - 2.2 * dt);
  scheduleMusic(rage(), kame);
}

function devour(victim) {
  victim.alive = false;
  if (victim.human) aiming = false;
  sfxChomp();
  shake = 16;
  skulls.push({ x: victim.x, y: victim.y });
  floatText(victim.x, victim.y - 24, "DEVOURED!", "#ff4e4e", 20);
  announce(`${victim.name} has been devoured!`, victim.color);
  for (let i = 0; i < 26; i++) {
    const a = rnd(0, Math.PI * 2), s = rnd(40, 260);
    spawnP(victim.x, victim.y, Math.cos(a) * s, Math.sin(a) * s, rnd(0.3, 0.7), rnd(2, 5),
           Math.random() < 0.5 ? "220,40,40" : "106,255,78", { drag: 2, grav: 60 });
  }
  hound.maxSpeed = HOUND_BASE_SPEED;
  hound.vx *= 0.2; hound.vy *= 0.2;
  hound.state = "chase";
  orb.cast = null;
  kamePhase = null;
  stopChargeSound();
  banner.style.opacity = 0;

  const alive = players.filter(p => p.alive);
  if (alive.length <= 1) {
    roundWinner = alive[0] || null;
    if (roundWinner) {
      roundWinner.wins++;
      if (roundWinner.wins >= WINS_TO_WIN) {
        matchWinner = roundWinner;
        state = "matchover";
        return;
      }
    }
    state = "roundover";
  } else {
    let best = alive[0], bd = 1e9;
    for (const q of alive) { const d = dist(q, victim); if (d < bd) { bd = d; best = q; } }
    orb.state = "held";
    orb.holder = best;
    orb.target = null;
    orb.cooldown = 1.2;
    announce(`${best.name} holds the orb!`, best.color);
  }
}

// ================= Render =================
function drawTorches() {
  for (let i = 0; i < 4; i++) {
    const [tx, ty] = TORCHES[i];
    // flickering light pool
    const fl = 0.10 + 0.035 * Math.sin(time * 13 + i * 2.1) + 0.02 * Math.sin(time * 29 + i);
    const g = ctx.createRadialGradient(tx, ty, 5, tx, ty, 130);
    g.addColorStop(0, `rgba(255,160,60,${fl})`);
    g.addColorStop(1, "rgba(255,160,60,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(tx, ty, 130, 0, Math.PI * 2); ctx.fill();
    // brazier
    ctx.fillStyle = "#2a2a38";
    ctx.beginPath(); ctx.arc(tx, ty + 4, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#1c1c28";
    ctx.fillRect(tx - 3, ty + 8, 6, 10);
    if (Math.random() < 0.5)
      spawnP(tx + rnd(-4, 4), ty, rnd(-8, 8), rnd(-60, -25), rnd(0.3, 0.8), rnd(2, 4),
             Math.random() < 0.7 ? "255,150,40" : "255,220,90", { drag: 1 });
  }
}
function drawShadow(x, y, r) {
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.beginPath(); ctx.ellipse(x, y + r * 0.85, r * 1.1, r * 0.4, 0, 0, Math.PI * 2); ctx.fill();
}
function drawSkulls() {
  for (const s of skulls) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = "#c9c9bb";
    ctx.beginPath(); ctx.arc(0, -2, 8, Math.PI, 0); ctx.fill();
    ctx.fillRect(-8, -2, 16, 5);
    ctx.fillRect(-5, 3, 3, 4); ctx.fillRect(-1, 3, 3, 4); ctx.fillRect(3, 3, 3, 4);
    ctx.fillStyle = "#1a1a24";
    ctx.beginPath(); ctx.arc(-3.5, -2, 2.2, 0, Math.PI * 2); ctx.arc(3.5, -2, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
function drawCrystals() {
  for (const c of crystals) {
    ctx.save();
    ctx.translate(c.x, c.y);
    const g = ctx.createRadialGradient(0, 0, 2, 0, 0, 26);
    g.addColorStop(0, "rgba(106,255,78,0.5)"); g.addColorStop(1, "rgba(106,255,78,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI * 2); ctx.fill();
    ctx.rotate(c.rot);
    ctx.fillStyle = "#6aff4e";
    ctx.beginPath();
    ctx.moveTo(0, -12); ctx.lineTo(8, 0); ctx.lineTo(0, 12); ctx.lineTo(-8, 0);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(8, 0); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}
function drawPlayer(p) {
  const moving = Math.hypot(p.vx, p.vy) > 20;
  const bob = moving ? Math.sin(time * 14 + p.x) * 2 : 0;
  drawShadow(p.x, p.y, PLAYER_R);
  ctx.save();
  ctx.translate(p.x, p.y + bob);
  if (p.boostT > 0) {                                       // swiftness shimmer
    ctx.strokeStyle = `rgba(106,255,78,${0.5 + 0.3 * Math.sin(time * 12)})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R + 4, 0, Math.PI * 2); ctx.stroke();
  }
  const g = ctx.createRadialGradient(-4, -5, 2, 0, 0, PLAYER_R + 2);
  g.addColorStop(0, "#ffffff"); g.addColorStop(0.25, p.color); g.addColorStop(1, shade(p.color));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, PLAYER_R, 0, Math.PI * 2); ctx.fill();
  // eyes look where you're going
  const ea = Math.atan2(p.vy, p.vx);
  const ex = moving ? Math.cos(ea) * 3 : 0, ey = moving ? Math.sin(ea) * 3 : -1;
  ctx.fillStyle = "#0a0a12";
  ctx.beginPath();
  ctx.arc(-4 + ex, -3 + ey, 2.6, 0, Math.PI * 2);
  ctx.arc(4 + ex, -3 + ey, 2.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = p.human ? "#fff" : "#99a";
  ctx.font = "bold 11px monospace"; ctx.textAlign = "center";
  ctx.fillText(p.name, p.x, p.y - PLAYER_R - 8);
}
function shade(hex) {
  const n = parseInt(hex.slice(1), 16);
  const r = (n >> 16) * 0.45 | 0, g = ((n >> 8) & 255) * 0.45 | 0, b = (n & 255) * 0.45 | 0;
  return `rgb(${r},${g},${b})`;
}
function drawOrb(x, y) {
  const pulse = 6 + Math.sin(time * 8) * 2;
  const g = ctx.createRadialGradient(x, y, 1, x, y, pulse + 10);
  g.addColorStop(0, "#fff"); g.addColorStop(0.35, "#8dffb0"); g.addColorStop(1, "rgba(106,255,78,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, pulse + 10, 0, Math.PI * 2); ctx.fill();
  if (Math.random() < 0.3) spawnP(x + rnd(-4, 4), y + rnd(-4, 4), rnd(-12, 12), rnd(-25, -5), 0.5, 2, "141,255,176");
}
function drawHound() {
  const kame = kamePhase === "blast";
  const r = rage();
  const spd = Math.hypot(hound.vx, hound.vy);
  drawShadow(hound.x, hound.y, HOUND_R);
  ctx.save();
  ctx.translate(hound.x, hound.y);
  // charging: crackling white-blue energy aura
  if (kamePhase === "charging") {
    const ar = HOUND_R * (1.8 + kameT * 1.1) + Math.sin(time * 30) * 4;
    const g = ctx.createRadialGradient(0, 0, HOUND_R * 0.4, 0, 0, ar);
    g.addColorStop(0, "rgba(255,255,255,0.9)");
    g.addColorStop(0.5, "rgba(120,200,255,0.45)");
    g.addColorStop(1, "rgba(120,200,255,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, ar, 0, Math.PI * 2); ctx.fill();
  } else if (r > 0.5 && hound.state !== "sleep") {          // fel aura grows with rage
    const g = ctx.createRadialGradient(0, 0, HOUND_R * 0.5, 0, 0, HOUND_R * (1.5 + r));
    g.addColorStop(0, `rgba(106,255,78,${0.25 * r})`);
    g.addColorStop(1, "rgba(106,255,78,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, HOUND_R * (1.5 + r), 0, Math.PI * 2); ctx.fill();
  }
  ctx.rotate(hound.angle);
  const bodyC = kame ? "#ff2b2b" : hound.state === "sleep" ? "#5a3336" : "#8f3230";
  const darkC = kame ? "#a01010" : "#4a1a18";
  // scuttling legs
  const step = time * (4 + spd * 0.025);
  ctx.strokeStyle = darkC; ctx.lineWidth = 4; ctx.lineCap = "round";
  const hips = [[-9, -9], [7, -10], [-9, 9], [7, 10]];
  for (let i = 0; i < 4; i++) {
    const [hx, hy] = hips[i];
    const sw = hound.state === "sleep" ? 0 : Math.sin(step + i * Math.PI / 2) * 7;
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(hx + sw, hy + Math.sign(hy) * 8);
    ctx.stroke();
  }
  // body with back spikes
  ctx.fillStyle = bodyC;
  ctx.beginPath(); ctx.ellipse(0, 0, HOUND_R, HOUND_R * 0.72, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = darkC;
  for (let i = 0; i < 4; i++) {
    const sx = HOUND_R * 0.5 - i * 9;
    ctx.beginPath();
    ctx.moveTo(sx - 4, -HOUND_R * 0.45);
    ctx.lineTo(sx, -HOUND_R * 0.95 - (hound.state === "sleep" ? 0 : Math.sin(time * 10 + i) * 1.5));
    ctx.lineTo(sx + 4, -HOUND_R * 0.45);
    ctx.closePath(); ctx.fill();
  }
  // head + jaw (mouth opens when closing in)
  const nearOrb = dist(hound, orb) < 130 && hound.state !== "sleep";
  const jaw = nearOrb ? 0.45 + 0.1 * Math.sin(time * 20) : 0.08;
  ctx.fillStyle = bodyC;
  ctx.save();
  ctx.translate(HOUND_R * 0.8, 0);
  ctx.save(); ctx.rotate(-jaw * 0.5);
  ctx.beginPath(); ctx.ellipse(HOUND_R * 0.28, -2, HOUND_R * 0.58, HOUND_R * 0.34, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.rotate(jaw * 0.5);
  ctx.fillStyle = darkC;
  ctx.beginPath(); ctx.ellipse(HOUND_R * 0.24, 3, HOUND_R * 0.5, HOUND_R * 0.24, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  if (jaw > 0.2) {                                          // teeth
    ctx.fillStyle = "#f5f0da";
    for (let i = 0; i < 3; i++) {
      const tx2 = HOUND_R * 0.15 + i * 5;
      ctx.beginPath();
      ctx.moveTo(tx2, -3); ctx.lineTo(tx2 + 2, 2); ctx.lineTo(tx2 + 4, -3);
      ctx.closePath(); ctx.fill();
    }
    if (Math.random() < 0.12)                               // drool
      spawnP(hound.x + Math.cos(hound.angle) * HOUND_R * 1.4, hound.y + Math.sin(hound.angle) * HOUND_R * 1.4,
             rnd(-10, 10), 20, 0.5, 2, "150,255,130", { grav: 200 });
  }
  ctx.restore();
  // tentacle-ears
  ctx.strokeStyle = kame ? "#ffb020" : "#c96a40"; ctx.lineWidth = 4; ctx.lineCap = "round";
  const wig = hound.state === "sleep" ? 0.1 : Math.sin(time * 12) * 0.35;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(HOUND_R * 0.5, s * HOUND_R * 0.4);
    ctx.quadraticCurveTo(HOUND_R * 0.1, s * HOUND_R * (1.3 + wig * s), -HOUND_R * 0.3, s * HOUND_R * (1.5 - wig * s));
    ctx.stroke();
  }
  // glowing fel eyes
  if (hound.state !== "sleep") {
    const eg = ctx.createRadialGradient(HOUND_R * 0.95, 0, 0, HOUND_R * 0.95, 0, 9);
    eg.addColorStop(0, kame ? "rgba(255,255,255,0.9)" : "rgba(106,255,78,0.7)");
    eg.addColorStop(1, "rgba(106,255,78,0)");
    ctx.fillStyle = eg;
    ctx.beginPath(); ctx.arc(HOUND_R * 0.95, 0, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = kame ? "#fff" : "#8dff5e";
    ctx.beginPath(); ctx.arc(HOUND_R * 0.95, -5, 2.6, 0, Math.PI * 2); ctx.arc(HOUND_R * 0.95, 5, 2.6, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.strokeStyle = "#2a1a1a"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(HOUND_R * 0.85, -6); ctx.lineTo(HOUND_R * 1.05, -4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(HOUND_R * 0.85, 6); ctx.lineTo(HOUND_R * 1.05, 4); ctx.stroke();
  }
  ctx.restore();
}
function drawParticles() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const p of particles) {
    if (!p.glow) continue;
    const a = Math.max(0, p.life / p.tl);
    ctx.fillStyle = `rgba(${p.rgb},${a * 0.85})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.4 + 0.6 * a), 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  for (const p of particles) {
    if (p.glow) continue;
    const a = Math.max(0, p.life / p.tl);
    ctx.fillStyle = `rgba(${p.rgb},${a * 0.6})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.4 + 0.6 * a), 0, Math.PI * 2); ctx.fill();
  }
}
function drawHUD() {
  // rage meter
  const r = Math.min(1, hound.maxSpeed / HOUND_PEAK);
  const kx = KAMEHAMEHA_SPEED / HOUND_PEAK;
  ctx.fillStyle = "rgba(10,10,16,0.75)";
  ctx.fillRect(16, 16, 280, 44);
  ctx.strokeStyle = "#333c33"; ctx.strokeRect(16, 16, 280, 44);
  ctx.fillStyle = "#1c1c28"; ctx.fillRect(24, 36, 264, 12);
  const grd = ctx.createLinearGradient(24, 0, 288, 0);
  grd.addColorStop(0, "#7bc74d"); grd.addColorStop(kx, "#ffb020"); grd.addColorStop(1, "#ff2b2b");
  ctx.fillStyle = grd;
  ctx.fillRect(24, 36, 264 * r, 12);
  ctx.strokeStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(24 + 264 * kx, 32); ctx.lineTo(24 + 264 * kx, 52); ctx.stroke();
  ctx.fillStyle = "#cfd8c8"; ctx.font = "bold 11px monospace"; ctx.textAlign = "left";
  ctx.fillText(`FELHOUND RAGE  ${Math.round(hound.maxSpeed)}`, 24, 30);
  // scoreboard
  ctx.textAlign = "right";
  players.forEach((p, i) => {
    const y = 30 + i * 18;
    ctx.globalAlpha = p.alive || state !== "play" ? 1 : 0.35;
    ctx.fillStyle = p.color;
    ctx.font = "bold 12px monospace";
    ctx.fillText(p.name, W - 76, y);
    for (let w = 0; w < WINS_TO_WIN; w++) {
      ctx.fillStyle = w < p.wins ? "#6aff4e" : "#2a2a3a";
      const dx = W - 62 + w * 16;
      ctx.beginPath();
      ctx.moveTo(dx, y - 9); ctx.lineTo(dx + 5, y - 4); ctx.lineTo(dx, y + 1); ctx.lineTo(dx - 5, y - 4);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
  // dash indicator
  const me = players[0];
  ctx.textAlign = "left"; ctx.font = "bold 12px monospace";
  if (me.alive) {
    const ready = me.dashCD <= 0;
    ctx.fillStyle = ready ? "#6aff4e" : "#555";
    ctx.fillText(ready ? "[D] DASH READY" : `[D] DASH ${me.dashCD.toFixed(1)}s`, 16, H - 40);
  } else {
    ctx.fillStyle = "#a55";
    ctx.fillText("YOU WERE DEVOURED — spectating", 16, H - 40);
  }
  ctx.fillStyle = "#667";
  ctx.font = "11px monospace";
  ctx.fillText("RMB move · A+LMB throw orb · D dash · S stop · Esc cancel", 16, H - 22);
  // announcer feed
  ctx.textAlign = "center"; ctx.font = "bold 14px monospace";
  msgs.forEach((m, i) => {
    ctx.globalAlpha = Math.min(1, m.t / 0.6);
    ctx.fillStyle = m.color;
    ctx.fillText(m.text, W / 2, 34 + i * 19);
    ctx.globalAlpha = 1;
  });
}
function drawOverlays() {
  if (state === "countdown") {
    const n = Math.ceil(countT / 0.7);
    ctx.fillStyle = "#6aff4e";
    ctx.font = "bold 90px Impact, sans-serif"; ctx.textAlign = "center";
    ctx.globalAlpha = 0.35 + 0.65 * ((countT % 0.7) / 0.7);
    ctx.fillText(String(n), W/2, H/2 - 40);
    ctx.globalAlpha = 1;
  }
  if (state === "menu") {
    ctx.fillStyle = "rgba(4,6,4,0.8)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    ctx.fillStyle = "#6aff4e";
    ctx.font = "bold 58px Impact, sans-serif";
    ctx.shadowColor = "#39ff14"; ctx.shadowBlur = 24;
    ctx.fillText("HUNGRY HUNGRY", W/2, H/2 - 120);
    ctx.fillText("FELHOUND", W/2, H/2 - 62);
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#9ab";
    ctx.font = "15px monospace";
    ctx.fillText("Whoever holds the fel orb is hunted. Pass it. Survive.", W/2, H/2 - 14);
    ctx.fillStyle = "#788";
    ctx.font = "13px monospace";
    const lines = [
      "RIGHT-CLICK ........ move (hold to steer)",
      "A + LEFT-CLICK ..... throw the orb (brief channel — you're rooted!)",
      "D .................. dash toward cursor",
      "S .................. stop        ESC ...... cancel",
      "",
      "The hound only gets faster. It slides on the ice — circle it.",
      "When it starts chanting... run.",
    ];
    lines.forEach((l, i) => ctx.fillText(l, W/2, H/2 + 22 + i * 20));
    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px monospace";
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(time * 4);
    ctx.fillText("— press SPACE to enter the arena —", W/2, H/2 + 196);
    ctx.globalAlpha = 1;
  }
  if (state === "roundover" || state === "matchover") {
    ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    const wp = state === "matchover" ? matchWinner : roundWinner;
    ctx.fillStyle = wp ? wp.color : "#fff";
    ctx.font = "bold 46px Impact, sans-serif";
    if (state === "matchover") {
      ctx.fillText(`${wp.name} WINS THE MATCH!`, W/2, H/2 - 20);
      if (Math.random() < 0.15) {
        const a = rnd(0, Math.PI * 2);
        spawnP(rnd(100, W - 100), rnd(100, H - 200), Math.cos(a) * 120, Math.sin(a) * 120 - 80,
               rnd(0.5, 1.2), 3, "106,255,78", { grav: 150, drag: 0.5 });
      }
    } else {
      ctx.fillText(wp ? `${wp.name} SURVIVES THE HUNT` : "THE HOUND FEASTS ALONE", W/2, H/2 - 20);
    }
    ctx.fillStyle = "#aaa"; ctx.font = "16px monospace";
    ctx.fillText(state === "matchover" ? "press SPACE for a new match" : `first to ${WINS_TO_WIN} — press SPACE for next round`, W/2, H/2 + 24);
  }
}
function drawFloatTexts() {
  ctx.textAlign = "center";
  for (const f of floatTexts) {
    ctx.globalAlpha = Math.min(1, f.t / (f.tl * 0.6));
    ctx.fillStyle = f.color;
    ctx.font = `bold ${f.size}px Impact, sans-serif`;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function draw() {
  canvas.classList.toggle("aiming", aiming);
  ctx.save();
  if (shake > 0) {
    ctx.translate(W/2, H/2);
    ctx.rotate((Math.random() - 0.5) * shake * 0.002);
    ctx.translate(-W/2 + (Math.random() - 0.5) * shake, -H/2 + (Math.random() - 0.5) * shake);
  }
  ctx.clearRect(-30, -30, W + 60, H + 60);
  ctx.drawImage(floorCv, 0, 0);

  // ritual circle glow breathes with rage
  const r = rage();
  ctx.strokeStyle = `rgba(106,255,78,${0.1 + 0.35 * r + 0.08 * Math.sin(time * (2 + 6 * r))})`;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(W/2, H/2, 150, 0, Math.PI * 2); ctx.stroke();

  drawTorches();
  drawSkulls();
  drawCrystals();

  for (const fx of clickFX) {
    ctx.strokeStyle = fx.color; ctx.lineWidth = 2;
    ctx.globalAlpha = fx.t * 2;
    ctx.beginPath(); ctx.arc(fx.x, fx.y, 8 + (0.5 - fx.t) * 24, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // aiming UI: range ring, targeting line, highlighted targets
  if (aiming && orb.state === "held") {
    ctx.strokeStyle = "rgba(141,255,176,0.5)"; ctx.lineWidth = 2; ctx.setLineDash([8, 8]);
    ctx.beginPath(); ctx.arc(orb.holder.x, orb.holder.y, THROW_RANGE, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    const tgt = aimTargetAt(mouse.x, mouse.y);
    ctx.strokeStyle = tgt ? "rgba(141,255,176,0.8)" : "rgba(255,80,80,0.4)";
    ctx.lineWidth = 1.5; ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(orb.holder.x, orb.holder.y);
    ctx.lineTo(tgt ? tgt.x : mouse.x, tgt ? tgt.y : mouse.y); ctx.stroke();
    ctx.setLineDash([]);
    for (const p of players) {
      if (!p.alive || p === orb.holder || dist(p, orb.holder) > THROW_RANGE) continue;
      ctx.strokeStyle = p === tgt ? "#fff" : "#8dffb0"; ctx.lineWidth = p === tgt ? 3 : 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, PLAYER_R + 6 + Math.sin(time * 6) * 2, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.fillStyle = "#8dffb0"; ctx.font = "bold 13px monospace"; ctx.textAlign = "center";
    ctx.fillText("SELECT TARGET", orb.holder.x, orb.holder.y - PLAYER_R - 40);
  }

  // move-target flag for the human
  const me = players[0];
  if (me.alive && me.moveTarget) {
    ctx.strokeStyle = "rgba(78,255,106,0.35)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(me.moveTarget.x, me.moveTarget.y, 5 + Math.sin(time * 8) * 2, 0, Math.PI * 2); ctx.stroke();
  }

  for (const p of players) if (p.alive) drawPlayer(p);

  // throw channel: cast bar + line to the receiver
  if (orb.state === "held" && orb.cast) {
    const h = orb.holder, prog = 1 - orb.cast.t / CAST_TIME;
    ctx.strokeStyle = "rgba(141,255,176,0.5)"; ctx.lineWidth = 1.5; ctx.setLineDash([3, 7]);
    ctx.beginPath(); ctx.moveTo(h.x, h.y); ctx.lineTo(orb.cast.target.x, orb.cast.target.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(10,10,16,0.8)";
    ctx.fillRect(h.x - 18, h.y - PLAYER_R - 38, 36, 6);
    ctx.fillStyle = "#8dffb0";
    ctx.fillRect(h.x - 17, h.y - PLAYER_R - 37, 34 * prog, 4);
  }

  drawOrb(orb.x, orb.y);
  drawHound();
  drawParticles();
  drawFloatTexts();

  // blast flash
  if (flash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flash * 0.85})`;
    ctx.fillRect(0, 0, W, H);
  }
  // vignette: subtle fel breathing, blue while charging, red in blast
  if (state === "play" || state === "countdown") {
    const blast = kamePhase === "blast";
    const chg = kamePhase === "charging";
    const a = blast ? 0.20 + 0.1 * Math.sin(time * 10)
            : chg ? 0.10 + 0.14 * (kameT / KAME_CHARGE_TIME)
            : 0.06 + 0.10 * r;
    const col = blast ? "255,0,0" : chg ? "120,200,255" : "40,120,40";
    const v = ctx.createRadialGradient(W/2, H/2, H * 0.32, W/2, H/2, H * 0.78);
    v.addColorStop(0, `rgba(${col},0)`);
    v.addColorStop(1, `rgba(${col},${a})`);
    ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);
  }

  drawHUD();
  drawOverlays();
  ctx.restore();
}

// ================= Loop =================
let last = performance.now();
function frame(nowMs) {
  const dt = Math.min(0.033, (nowMs - last) / 1000);
  last = nowMs;
  time += state === "menu" || state === "roundover" || state === "matchover" ? dt : 0;
  if (state === "play" || state === "countdown") update(dt);
  else updateFX(dt);
  draw();
  requestAnimationFrame(frame);
}
resetMatch();
requestAnimationFrame(frame);
</script>
</body>
